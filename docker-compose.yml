services:
  postgres:
    image: postgres:17
    container_name: agrosys-postgres

    environment:
      POSTGRES_DB: agrosys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: makil22

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: agrosys-backend

    ports:
      - "3001:3001"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: agrosys-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: